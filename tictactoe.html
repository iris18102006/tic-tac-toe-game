<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            width: 340px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            color: #222;
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 1rem;
        }

        .score-item .label {
            font-size: 12px;
            color: #999;
        }

        .score-item .val {
            font-size: 22px;
            font-weight: 600;
        }

        .score-item.x .val {
            color: #185FA5;
        }

        .score-item.o .val {
            color: #993556;
        }

        .score-item.d .val {
            color: #888;
        }

        .status {
            font-size: 15px;
            color: #555;
            margin-bottom: 1rem;
            min-height: 22px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 1.2rem;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
            transition: background 0.15s;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: #f0f0f0;
        }

        .cell.taken {
            cursor: default;
        }

        .cell.x {
            color: #185FA5;
        }

        .cell.o {
            color: #993556;
        }

        .cell.win {
            background: #eef4ff;
            border-color: #aac4ee;
        }

        button {
            padding: 9px 28px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            color: #333;
            transition: background 0.15s;
        }

        button:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>

        <div class="score">
            <div class="score-item x">
                <div class="label">X</div>
                <div class="val" id="sx">0</div>
            </div>
            <div class="score-item d">
                <div class="label">draws</div>
                <div class="val" id="sd">0</div>
            </div>
            <div class="score-item o">
                <div class="label">O</div>
                <div class="val" id="so">0</div>
            </div>
        </div>

        <div class="status" id="status">X's turn</div>

        <div class="board" id="board">
            <div class="cell" data-i="0"></div>
            <div class="cell" data-i="1"></div>
            <div class="cell" data-i="2"></div>
            <div class="cell" data-i="3"></div>
            <div class="cell" data-i="4"></div>
            <div class="cell" data-i="5"></div>
            <div class="cell" data-i="6"></div>
            <div class="cell" data-i="7"></div>
            <div class="cell" data-i="8"></div>
        </div>

        <button id="reset">New game</button>
    </div>

    <script>
        const wins = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
        let board, current, over, scores = { X: 0, O: 0, D: 0 };

        function init() {
            board = Array(9).fill('');
            current = 'X';
            over = false;
            document.querySelectorAll('.cell').forEach(c => {
                c.textContent = '';
                c.className = 'cell';
            });
            document.getElementById('status').textContent = "X's turn";
        }

        function checkWin() {
            for (const [a, b, c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a, b, c];
            }
            return null;
        }

        document.getElementById('board').addEventListener('click', e => {
            const cell = e.target.closest('.cell');
            if (!cell || over || board[cell.dataset.i]) return;
            const i = +cell.dataset.i;
            board[i] = current;
            cell.textContent = current;
            cell.classList.add('taken', current.toLowerCase());

            const w = checkWin();
            if (w) {
                w.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
                document.getElementById('status').textContent = `${current} wins!`;
                scores[current]++;
                document.getElementById(current === 'X' ? 'sx' : 'so').textContent = scores[current];
                over = true;
            } else if (board.every(Boolean)) {
                document.getElementById('status').textContent = "It's a draw!";
                scores.D++;
                document.getElementById('sd').textContent = scores.D;
                over = true;
            } else {
                current = current === 'X' ? 'O' : 'X';
                document.getElementById('status').textContent = `${current}'s turn`;
            }
        });

        document.getElementById('reset').addEventListener('click', init);
        init();
    </script>
</body>

</html>
